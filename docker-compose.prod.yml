# Production overrides. Used on the Hetzner VM:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  app:
    # No source bind-mount, no --reload, no published port in production — the
    # base file no longer defines any of those (they live in
    # docker-compose.override.yml, which isn't loaded here). --proxy-headers
    # makes the app trust Caddy's X-Forwarded-* so it sees the real client IP.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    restart: unless-stopped

  caddy:
    image: caddy:2
    environment:
      # Set SITE_ADDRESS in .env to your domain to enable automatic HTTPS.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  db:
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
