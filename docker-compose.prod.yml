# Production overrides. Used on the Hetzner VM:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  app:
    # No source bind-mount, no --reload in production.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: []
    ports: []   # not exposed directly; Caddy proxies to it
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  db:
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
