services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game}
      POSTGRES_DB: ${POSTGRES_DB:-andrejsala}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-game}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    # --reload for local dev; the prod override removes it.
    # WATCHFILES_FORCE_POLLING: file-change events don't cross the macOS→Colima
    # VM boundary, so the reloader must poll to notice your edits.
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
