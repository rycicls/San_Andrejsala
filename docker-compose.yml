services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-game}
      POSTGRES_DB: ${POSTGRES_DB:-andrejsala}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-game}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    # Dev-only bits (--reload, bind mount, published port 8000) live in
    # docker-compose.override.yml, auto-loaded alongside this file for plain
    # `docker compose up`. Production passes -f explicitly and skips it — see
    # docker-compose.prod.yml. (Compose CONCATENATES list keys like `ports`
    # across -f files rather than replacing them, so those dev-only values
    # must never live here in the base file, or prod would inherit them too.)
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
